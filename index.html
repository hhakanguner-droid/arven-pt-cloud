  $$(".library-card").forEach(card=>card.addEventListener("click",()=>{
    const chosen=structuredClone(items[Number(card.dataset.libIndex)]);
    delete chosen._suggested;
    applyExerciseChoice(chosen);
  }));
}
function applyExerciseChoice(chosen) {
  const {dayIndex,exIndex,mode}=exerciseModalContext;
  if(mode==="replace")program[dayIndex].exercises[exIndex]=chosen;
  else program[dayIndex].exercises.push(chosen);
  closeExerciseModal();renderProgramEditor();showToast(mode==="replace"?"Hareket değiştirildi.":"Hareket eklendi.");
}
function addCustomExercise() {
  if(!exerciseModalContext)return;
  const name=prompt("Hareket adı:");if(!name)return;
  const tracking=prompt("Takip türü: 1 = kg+tekrar, 2 = tekrar, 3 = süre (sn)","1");
  const type=tracking==="3"?"time":tracking==="2"?"reps":"weightReps";
  applyExerciseChoice({
    name,plan:type==="time"?"3 × 30 sn":"3 × 10",rest:"60 sn",tracking:type,
    alternative:"Hareket açıklığını azalt",alternatives:[],muscleGroup:inferMuscleGroup(name),backFriendly:false,
    video:"https://www.youtube.com/results?search_query="+encodeURIComponent(name+" proper form")
  });
}

// ---------- Bulut senkronizasyonu ----------
function getAppState() {
  return {
    version: 4.2,
    program,
    workouts,
    measurements,
    settings,
    deletedWorkoutIds,
    deletedMeasurementIds,
    savedAt: new Date().toISOString()
  };
}

function applyAppState(state) {
  if (!state || typeof state !== "object") return;
  program = normalizeProgram(state.program || structuredClone(defaultProgram));
  workouts = normalizeWorkouts(state.workouts || []);
  measurements = Array.isArray(state.measurements) ? state.measurements : [];
  settings = { ...defaultSettings, ...(state.settings || {}) };
  deletedWorkoutIds = Array.isArray(state.deletedWorkoutIds) ? state.deletedWorkoutIds : [];
  deletedMeasurementIds = Array.isArray(state.deletedMeasurementIds) ? state.deletedMeasurementIds : [];

  // Buluttan indirirken tekrar yükleme kuyruğu oluşturmamak için doğrudan localStorage.
  localStorage.setItem(STORAGE_KEYS.program, JSON.stringify(program));
  localStorage.setItem(STORAGE_KEYS.workouts, JSON.stringify(workouts));
  localStorage.setItem(STORAGE_KEYS.measurements, JSON.stringify(measurements));
  localStorage.setItem(STORAGE_KEYS.settings, JSON.stringify(settings));
  localStorage.setItem(STORAGE_KEYS.deletedWorkouts, JSON.stringify(deletedWorkoutIds));
  localStorage.setItem(STORAGE_KEYS.deletedMeasurements, JSON.stringify(deletedMeasurementIds));

  renderDashboard();
  if ($("#historyView").classList.contains("active")) renderHistory();
  if ($("#volumeView").classList.contains("active")) renderVolume();
  if ($("#measurementsView").classList.contains("active")) renderMeasurements();
  if ($("#editorView").classList.contains("active")) renderProgramEditor();
  renderCloudSettings();
}

function setCloudStatus(mode, text) {
  const button = $("#cloudStatusButton");
  const label = $("#cloudStatusText");
  if (!button || !label) return;
  button.classList.remove("local", "online", "syncing", "error");
  button.classList.add(mode);
  label.textContent = text;
}

function openAuthOverlay(message = "") {
  if (cloudLocalOnlyForSession) return;
  $("#authOverlay")?.classList.add("open");
  $("#authOverlay")?.setAttribute("aria-hidden", "false");
  if ($("#authMessage")) $("#authMessage").textContent = message;
}

function closeAuthOverlay() {
  $("#authOverlay")?.classList.remove("open");
  $("#authOverlay")?.setAttribute("aria-hidden", "true");
}

function renderCloudSettings() {
  const configured = window.ArvenCloud?.isConfigured();
  const config = window.ArvenCloud?.readConfig?.() || { url: "", key: "" };

  if ($("#supabaseUrlInput")) $("#supabaseUrlInput").value = config.url || "";
  if ($("#supabaseKeyInput")) $("#supabaseKeyInput").value = config.key || "";

  const status = $("#cloudSettingsStatus");
  const accountArea = $("#cloudAccountArea");
  if (!configured) {
    status.textContent = "Yapılandırılmadı";
    status.classList.remove("online");
    accountArea?.classList.remove("visible");
    return;
  }

  if (cloudUser) {
    status.textContent = "Bağlı";
    status.classList.add("online");
    accountArea?.classList.add("visible");
    $("#cloudAccountEmail").textContent = cloudUser.email || "—";
    $("#lastSyncText").textContent = lastCloudSyncAt
      ? new Intl.DateTimeFormat("tr-TR", { dateStyle: "short", timeStyle: "short" }).format(lastCloudSyncAt)
      : "Henüz yapılmadı";
  } else {
    status.textContent = cloudLocalOnlyForSession ? "Bu oturum yerel" : "Giriş bekleniyor";
    status.classList.remove("online");
    accountArea?.classList.remove("visible");
  }
}

function scheduleCloudSync() {
  if (!cloudUser || cloudSyncInProgress) return;
  clearTimeout(cloudSyncTimer);
  cloudSyncTimer = setTimeout(() => pushStateToCloud(false), 850);
}

async function pushStateToCloud(showMessage = true) {
  if (!cloudUser || !window.ArvenCloud?.isConfigured()) return;
  try {
    cloudSyncInProgress = true;
    setCloudStatus("syncing", "Senkronize");
    const mergedState = await window.ArvenCloud.pushState(cloudUser.id, getAppState());
    if (mergedState) applyAppState(mergedState);
    lastCloudSyncAt = new Date();
    setCloudStatus("online", "Bulutta");
    renderCloudSettings();
    if (showMessage) showToast("Kayıtlar buluta gönderildi.");
  } catch (error) {
    console.error(error);
    setCloudStatus("error", "Senkron hatası");
    if (showMessage) showToast("Bulut senkronizasyonu başarısız.");
  } finally {
    cloudSyncInProgress = false;
  }
}

async function pullStateFromCloud({ askOnConflict = true, showMessage = true } = {}) {
  if (!cloudUser || !window.ArvenCloud?.isConfigured()) return;
  try {
    cloudSyncInProgress = true;
    setCloudStatus("syncing", "Senkronize");
    const mergedState = await window.ArvenCloud.pushState(cloudUser.id, getAppState());
    if (mergedState) applyAppState(mergedState);
    lastCloudSyncAt = new Date();
    setCloudStatus("online", "Bulutta");
    renderCloudSettings();
    if (showMessage) showToast("Bu cihaz ve bulut kayıtları güvenle birleştirildi.");
  } catch (error) {
    console.error(error);
    setCloudStatus("error", "Senkron hatası");
    if (showMessage) showToast("Bulut verileri birleştirilemedi. Supabase kurulumunu kontrol et.");
  } finally {
    cloudSyncInProgress = false;
  }
}

async function connectCloudUser(user, askOnConflict = true) {
  cloudUser = user;
  cloudLocalOnlyForSession = false;
  closeAuthOverlay();
  setCloudStatus("syncing", "Bağlanıyor");
  renderCloudSettings();
  await pullStateFromCloud({ askOnConflict, showMessage: true });
}

async function initializeCloud() {
  renderCloudSettings();

  if (!window.ArvenCloud?.isConfigured()) {
    setCloudStatus("local", "Yerel");
    return;
  }

  if (!window.supabase?.createClient) {
    setCloudStatus("error", "Bağlantı yok");
    showToast("Supabase kütüphanesi yüklenemedi.");
    return;
  }

  try {
    const { user, error } = await window.ArvenCloud.getSession();
    if (error) throw error;
    if (user) {
      await connectCloudUser(user, true);
    } else {
      setCloudStatus("local", "Giriş gerekli");
      openAuthOverlay();
    }

    window.ArvenCloud.onAuthChange(async (event, session) => {
      if (event === "SIGNED_OUT") {
        cloudUser = null;
        setCloudStatus("local", "Giriş gerekli");
        renderCloudSettings();
        if (!cloudLocalOnlyForSession) openAuthOverlay();
      }
      if (event === "SIGNED_IN" && session?.user && session.user.id !== cloudUser?.id) {
        await connectCloudUser(session.user, true);
      }
    });
  } catch (error) {
    console.error(error);
    setCloudStatus("error", "Bağlantı hatası");
    openAuthOverlay("Bulut bağlantısı kurulamadı. Proje URL ve anahtarını kontrol et.");
  }
}

  message.classList.remove("success");
  message.textContent = "Hesap oluşturuluyor…";

    const data = await window.ArvenCloud.signUp(email, password);

      message.textContent = "";
      await connectCloudUser(data.session.user, true);

      message.textContent = "Hesap oluşturuldu. Supabase e-posta onayı açıksa gelen kutundaki bağlantıyı onayla, sonra giriş yap.";

    message.textContent = error?.message || "Hesap oluşturulamadı.";

});
